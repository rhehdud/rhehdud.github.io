short_bio: >-
  <p>
    I am a senior undergraduate student in Artificial Intelligence at the Division of AI and Computer Engineering, Kyonggi University, where I work as an undergraduate research student at the AI Vision Lab under the supervision of Prof. Junho Ahn.
  </p>
  <p>
    I am broadly interested in understanding and improving how deep learning models learn and evolve. In particular, I am interested in efficient and continual learning, the fundamental principles behind generalization and optimization, and the advancement of model architectures. I am also curious about scaling laws and what drives the capabilities of large models.
  </p>

